<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luminos — Create Account</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/auth.css">
  <style>
    .lum-brand-icon { background: var(--text) !important; display:flex; align-items:center; justify-content:center; }
    .lum-brand-icon i { color: var(--accent); font-size: 1.6rem; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-blob auth-blob-1"></div>
    <div class="auth-blob auth-blob-2"></div>
    <div class="auth-wrap">

      <div class="auth-brand">
        <div class="brand-icon lum-brand-icon"><i class="fa-solid fa-bolt"></i></div>
        <h1>Luminos</h1>
        <p>Premium desk & tech accessories</p>
      </div>

      <!-- Sign up form -->
      <div class="auth-card" id="signup-form-card">
        <h2>Create account</h2>
        <div class="form-group">
          <label for="signup-name"><i class="fa-solid fa-user"></i> Full Name</label>
          <input type="text" id="signup-name" placeholder="Your full name" autocomplete="name">
        </div>
        <div class="form-group">
          <label for="signup-email"><i class="fa-regular fa-envelope"></i> Email</label>
          <input type="email" id="signup-email" placeholder="you@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="signup-password"><i class="fa-solid fa-lock"></i> Password</label>
          <input type="password" id="signup-password" placeholder="Min. 6 characters" autocomplete="new-password">
        </div>
        <div id="signup-error" class="error-msg hidden"></div>

        <label class="auth-agree">
          <input type="checkbox" id="agree-checkbox">
          <span>I agree to the <a href="terms.html" target="_blank">Terms &amp; Conditions</a> and <a href="privacypolicy.html" target="_blank">Privacy Policy</a></span>
        </label>

        <button class="btn-primary full-width" onclick="handleSignup()">
          <i class="fa-solid fa-user-plus"></i> Create Account
        </button>
        <p class="auth-switch">Have an account? <a href="login.html">Sign in</a></p>
        <p class="auth-switch" style="margin-top:0.5rem;"><a href="../index.html" style="color:var(--text-2);"><i class="fa-solid fa-arrow-left"></i> Back to shop</a></p>
      </div>

      <!-- Success card -->
      <div class="auth-card hidden" id="signup-success-card">
        <div style="text-align:center;padding:1rem 0;">
          <i class="fa-solid fa-circle-check" style="font-size:3rem;color:var(--accent);margin-bottom:1rem;display:block;"></i>
          <h2>Welcome to Luminos!</h2>
          <p style="color:var(--text-2);margin:1rem 0;">Your account has been created. You're signed in and ready to shop.</p>
          <a href="../index.html" class="btn-primary full-width">
            <i class="fa-solid fa-bag-shopping"></i> Start Shopping
          </a>
        </div>
      </div>

    </div>
  </div>

  <script src="js/auth-local.js"></script>
  <script>
    if (Auth.isLoggedIn()) window.location.href = '../index.html';

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg; el.classList.remove('hidden');
    }
    function clearError(id) {
      const el = document.getElementById(id);
      el.textContent = ''; el.classList.add('hidden');
    }

    function handleSignup() {
      clearError('signup-error');
      const name = document.getElementById('signup-name').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const pw = document.getElementById('signup-password').value;
      const agreed = document.getElementById('agree-checkbox').checked;

      if (!name || !email || !pw) { showError('signup-error', 'Please fill in all fields.'); return; }
      if (!agreed) { showError('signup-error', 'Please agree to the Terms & Conditions.'); return; }

      const result = Auth.signup(name, email, pw);
      if (result.error) { showError('signup-error', result.error); return; }

      document.getElementById('signup-form-card').classList.add('hidden');
      document.getElementById('signup-success-card').classList.remove('hidden');
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSignup();
    });
  </script>
</body>
</html>
