<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luminos — Sign In</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/auth.css">
  <style>
    .auth-brand p { color: var(--text-2); }
    .lum-brand-icon { background: var(--text) !important; display:flex; align-items:center; justify-content:center; }
    .lum-brand-icon i { color: var(--accent); font-size: 1.6rem; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-blob auth-blob-1"></div>
    <div class="auth-blob auth-blob-2"></div>
    <div class="auth-wrap">

      <div class="auth-brand">
        <div class="brand-icon lum-brand-icon"><i class="fa-solid fa-bolt"></i></div>
        <h1>Luminos</h1>
        <p>Premium desk & tech accessories</p>
      </div>

      <div class="auth-card" id="login-card">
        <h2>Welcome back</h2>
        <div class="form-group">
          <label for="login-email"><i class="fa-regular fa-envelope"></i> Email</label>
          <input type="email" id="login-email" placeholder="you@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="login-password"><i class="fa-solid fa-lock"></i> Password</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <div id="login-error" class="error-msg hidden"></div>
        <button class="btn-primary full-width" onclick="handleLogin()">
          <i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In
        </button>
        <p class="auth-switch">No account? <a href="signup.html">Create one</a></p>
        <p class="auth-switch" style="margin-top:0.5rem;"><a href="../index.html" style="color:var(--text-2);"><i class="fa-solid fa-arrow-left"></i> Back to shop</a></p>
      </div>

    </div>
  </div>

  <script src="js/auth-local.js"></script>
  <script>
    // Redirect if already logged in
    if (Auth.isLoggedIn()) {
      const redirect = sessionStorage.getItem('luminos_redirect_after_login');
      window.location.href = redirect || '../index.html';
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg; el.classList.remove('hidden');
    }
    function clearError(id) {
      const el = document.getElementById(id);
      el.textContent = ''; el.classList.add('hidden');
    }

    function handleLogin() {
      clearError('login-error');
      const email = document.getElementById('login-email').value.trim();
      const pw = document.getElementById('login-password').value;
      if (!email || !pw) { showError('login-error', 'Please fill in all fields.'); return; }
      const result = Auth.login(email, pw);
      if (result.error) { showError('login-error', result.error); return; }
      // Redirect back to intended page if set
      const redirect = sessionStorage.getItem('luminos_redirect_after_login');
      sessionStorage.removeItem('luminos_redirect_after_login');
      window.location.href = redirect || '../index.html';
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
